<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Room | Full Dashboard</title>
    <style>
        :root {
            --bg: #0b1120;
            --navbar: #16213e;
            --card: #1e293b;
            --primary: #2563eb;
            --accent: #f59e0b;
            --success: #00ff88;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
        }

        /* --- Navbar (Exact Copy) --- */
        .navbar {
            background: var(--navbar);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #334155;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { width: 35px; height: 35px; background: #ff4757; border-radius: 50%; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .nav-links { display: flex; gap: 15px; font-size: 0.8rem; color: #94a3b8; }
        .profile { margin-left: auto; background: var(--primary); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .container { max-width: 500px; margin: auto; padding: 15px 15px 60px 15px; }

        /* --- Filter Tabs --- */
        .filters { display: flex; justify-content: center; gap: 10px; margin: 15px 0; overflow-x: auto; }
        .f-btn { background: #334155; border: none; color: white; padding: 7px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
        .f-btn.active { background: var(--primary); }

        /* --- Exam Countdown --- */
        .exam-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .time-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 10px; }
        .time-box b { display: block; font-size: 1.3rem; color: var(--accent); }

        /* --- Self Tracker --- */
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #live-timer { font-size: 3rem; font-family: monospace; text-align: center; color: var(--success); margin: 15px 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .study { background: #10b981; } .mobile { background: #f59e0b; } .class { background: #06b6d4; } .prayer { background: #8b5cf6; color: white; }
        .stop { background: #fff; grid-column: span 2; margin-top: 5px; }
        .dl-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); width: 100%; margin-top: 15px; }

        /* --- Leaderboard (Exact Copy) --- */
        .l-item { background: #16213e; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .l-top { border: 1px solid var(--accent); background: rgba(245, 158, 11, 0.05); }
        .l-info { display: flex; align-items: center; gap: 12px; }
        .l-rank { width: 20px; font-weight: bold; color: #64748b; }
        .l-img { width: 40px; height: 40px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .l-name b { display: block; font-size: 0.9rem; }
        .l-group { background: var(--primary); font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; }
        .l-time { text-align: right; }
        .total-t { color: var(--success); font-weight: bold; font-size: 1rem; }

        /* --- Admin Control --- */
        .admin-panel { border: 2px dashed #334155; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-img">RR</div>
        <div class="nav-links">
            <span>Self Tracker</span>
            <span>Study User Report</span>
            <span>Session</span>
        </div>
        <div class="profile">R</div>
    </div>

    <div class="filters">
        <button class="f-btn active">Daily</button>
        <button class="f-btn">Weekly</button>
        <button class="f-btn">Monthly</button>
        <button class="f-btn">📅 Date</button>
    </div>

    <div class="container">
        <div class="exam-card">
          <div class="date-display" id="today-date">আজকের তারিখ: --/--/----</div>
            <small>🎯 HSC 2026 পরীক্ষার আর বাকি</small>
            <div class="timer-grid">
                <div class="time-box"><b id="d">00</b>দিন</div>
                <div class="time-box"><b id="h">00</b>ঘণ্টা</div>
                <div class="time-box"><b id="m">00</b>মিনিট</div>
                <div class="time-box"><b id="s">00</b>সেকেন্ড</div>
            </div>
        </div>

        <div class="card">
            <div style="text-align: center; color: #94a3b8; font-size: 0.85rem;" id="status">বিরতি নিচ্ছেন</div>
            <div id="live-timer">00:00:00</div>
            <div class="btn-grid">
                <button class="btn study" onclick="pStart('পড়াশোনা', 'study')">📖 Self Study</button>
                <button class="btn class" onclick="pStart('ক্লাস', 'class')">💻 Online Class</button>
                <button class="btn mobile" onclick="pStart('মোবাইল', 'mobile')">📱 Mobile Use</button>
                <button class="btn prayer" onclick="pStart('নামাজ', 'prayer')">🕌 Namaj</button>
                <button class="btn stop" onclick="pStop()">⏹ কাজ শেষ (Stop)</button>
            </div>
            <button class="btn dl-btn" onclick="downloadMe()">📥 আমার রিপোর্ট ডাউনলোড</button>

    </div>

    <script>
    	const options = { year: 'numeric', month: 'long', day: 'numeric' };
    	document.getElementById('today-date').innerText = "আজকের তারিখ: " + new Date().toLocaleDateString('bn-BD', options);
        // --- Countdown ---
        const target = new Date("July 2, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        // --- Tracker ---
        let timer, startT, active = null;
        let pData = JSON.parse(localStorage.getItem('my_report')) || { study: 0, class: 0, mobile: 0, prayer: 0 };

        function pStart(label, key) {
            if(active) pStop();
            active = key; startT = Date.now();
            document.getElementById('status').innerText = "চলছে: " + label;
            clearInterval(timer);
            timer = setInterval(() => {
                let d = Date.now() - startT;
                let h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
                document.getElementById('live-timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        function pStop() {
            if(!active) return;
            pData[active] += Math.round((Date.now() - startT) / 60000);
            localStorage.setItem('my_report', JSON.stringify(pData));
            clearInterval(timer); active = null;
            document.getElementById('status').innerText = "বিরতি নিচ্ছেন";
            document.getElementById('live-timer').innerText = "00:00:00";
        }

        function downloadMe() {
            let txt = `PERSONAL REPORT\nStudy: ${pData.study}m\nClass: ${pData.class}m\nMobile: ${pData.mobile}m\nNamaj: ${pData.prayer}m`;
            const blob = new Blob([txt], {type: "text/plain"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "MyReport.txt"; a.click();
        }

        // --- Leaderboard ---
        let db = JSON.parse(localStorage.getItem('final_db')) || [];
        function addRank() {
            const name = document.getElementById('adm-name').value;
            const group = document.getElementById('adm-group').value;
            const hr = document.getElementById('adm-hr').value;
            if(name && hr) {
                db.push({ name, group, hr: parseInt(hr) });
                localStorage.setItem('final_db', JSON.stringify(db));
                render();
                document.getElementById('adm-name').value = ''; document.getElementById('adm-hr').value = '';
            }
        }

        function render() {
            const list = document.getElementById('leaderboard');
            list.innerHTML = '';
            db.sort((a,b) => b.hr - a.hr);
            db.forEach((item, i) => {
                const isTop = i === 0 ? 'l-top' : '';
                list.innerHTML += `
                    <div class="l-item ${isTop}">
                        <div class="l-info">
                            <span class="l-rank">${i+1}</span>
                            <div class="l-img">${item.name[0]}</div>
                            <div><b>${item.name}</b> <span class="l-group">${item.group}</span></div>
                        </div>
                        <div class="l-time">
                            <div class="total-t">${item.hr}h 00m</div>
                            <small style="font-size:0.5rem; color:#64748b;">TOTAL STUDY</small>
                        </div>
                    </div>`;
            });
        }
        render();
        
    </script>
</body>
</html>
