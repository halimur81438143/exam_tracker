<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Room | Original UI</title>
    <style>
        :root {
            --bg: #0b1120;
            --navbar: #16213e;
            --card: #1e293b;
            --primary: #2563eb;
            --accent: #f59e0b;
            --success: #00ff88;
            --gap-color: #ec4899;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
        }

        /* --- Stylish Logo Area --- */
        .header-section { text-align: center; padding: 15px 0; }
        .study-logo {
            width: 55px; height: 55px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            border-radius: 15px; margin: 0 auto 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: white;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        /* --- Navbar (Original) --- */
        .navbar {
            background: var(--navbar); padding: 12px 20px;
            display: flex; justify-content: center; gap: 25px;
            border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100;
        }
        .nav-link { font-size: 0.85rem; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: white; font-weight: bold; border-bottom: 2px solid var(--primary); padding-bottom: 3px; }

        .container { max-width: 500px; margin: auto; padding: 15px; }
        .status-card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            text-align: center; margin-bottom: 15px; border: 1px solid #334155;
        }

        /* --- Filter Buttons --- */
        .filters { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .f-btn {
            background: #334155; border: none; color: white;
            padding: 8px 12px; border-radius: 12px; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s;
        }

        /* --- Calendar Pop-up Style --- */
        #calendar-popup {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .calendar-card {
            background: var(--card); padding: 25px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center;
        }
        .calendar-input {
            background: #0f172a; color: white; border: 1px solid #334155;
            padding: 10px; border-radius: 10px; font-size: 1rem; outline: none;
        }

        /* --- Timer & Buttons (Original) --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-box { background: rgba(0,0,0,0.3); padding: 10px 2px; border-radius: 12px; }
        .time-box b { display: block; font-size: 1.3rem; color: var(--accent); font-family: monospace; }
        
        #live-timer { font-size: 3.5rem; color: var(--success); margin: 20px 0; font-family: monospace; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .t-btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 0.8rem; }
        .stop-btn { background: #f8fafc; color: #0f172a; grid-column: span 2; margin-top: 10px; font-size: 1rem; }

        .page { display: none; }
        .page.active { display: block; }
        .gap-pill { background: rgba(236, 72, 153, 0.1); padding: 6px 15px; border-radius: 20px; font-size: 0.7rem; color: var(--gap-color); margin: 15px auto; display: table; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="study-logo">📖</div>
        <b style="font-size: 1rem; letter-spacing: 1px; color: var(--primary);">SELF STUDY ROOM</b>
    </div>

    <div class="navbar">
        <span id="tab1" class="nav-link active" onclick="goPage(1)">Self Tracker</span>
        <span id="tab2" class="nav-link" onclick="goPage(2)">Milestones</span>
    </div>

    <div id="calendar-popup" onclick="closeCal(event)">
        <div class="calendar-card" onclick="event.stopPropagation()">
            <h3 style="margin-top:0;">তারিখ নির্বাচন করুন</h3>
            <input type="date" class="calendar-input" onchange="closeCal()">
            <br><br>
            <button class="f-btn" onclick="document.getElementById('calendar-popup').style.display='none'">বন্ধ করুন</button>
        </div>
    </div>

    <div class="container">
        
        <div id="p1" class="page active">
            <div class="filters">
                <button class="f-btn" onclick="down('Daily')">Daily</button>
                <button class="f-btn" onclick="down('Weekly')">Weekly</button>
                <button class="f-btn" onclick="down('Monthly')">Monthly</button>
                <button class="f-btn" onclick="document.getElementById('calendar-popup').style.display='flex'">📅 Date</button>
            </div>

            <div class="status-card">
                <div style="font-size: 0.9rem; font-weight: bold;">তারিখ: <span id="b-date">---</span></div>
                <div style="font-size: 0.75rem; color: #ef4444; margin-top:5px; font-weight: bold;">🎯 HSC 2026 Countdown</div>
                <div class="timer-grid">
                    <div class="time-box"><b id="main-d">00</b><small>দিন</small></div>
                    <div class="time-box"><b id="main-h">00</b><small>ঘণ্টা</small></div>
                    <div class="time-box"><b id="main-m">00</b><small>মিনিট</small></div>
                    <div class="time-box"><b id="main-s">00</b><small>সেকেন্ড</small></div>
                </div>
            </div>

            <div class="status-card">
                <small id="status-label" style="color: #94a3b8;">বিরতি নিচ্ছেন</small>
                <div id="live-timer">00:00:00</div>
                <div class="btn-grid">
                    <button class="t-btn" style="background:#10b981;" onclick="run('Study')">📖 Study</button>
                    <button class="t-btn" style="background:#06b6d4;" onclick="run('Class')">💻 Class</button>
                    <button class="t-btn" style="background:#f59e0b;" onclick="run('Mobile')">📱 Mobile</button>
                    <button class="t-btn" style="background:#8b5cf6;" onclick="run('Namaj')">🕌 Namaj</button>
                    <button class="t-btn" style="background:#ef4444;" onclick="run('Food')">🍴 Food</button>
                    <button class="t-btn" style="background:#64748b;" onclick="run('Others')">⚙️ Others</button>
                    <button class="t-btn stop-btn" onclick="stop()">■ কাজ শেষ (Stop)</button>
                </div>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="status-card">🚀 HSC শুরু: ০২ জুলাই, ২০২৬<div class="timer-grid" id="cd-hsc-s"></div></div>
            <div class="status-card">🏁 HSC শেষ: ২৯ জুলাই, ২০২৬<div class="timer-grid" id="cd-hsc-e"></div></div>
            <div class="gap-pill" id="g1">Gap 1</div>
            <div class="status-card" style="border-top: 3px solid var(--accent);">✍️ কোচিং শুরু: ০১ সেপ্টেম্বর<div class="timer-grid" id="cd-coach"></div></div>
            <div class="gap-pill" id="g2">Gap 2</div>
            <div class="status-card" style="border-top: 3px solid var(--success);">🩺 মেডিকেল অ্যাডমিশন: ১১ ডিসেম্বর<div class="timer-grid" id="cd-med"></div></div>
        </div>

    </div>

    <script>
        function goPage(n) {
            document.getElementById('p1').classList.toggle('active', n===1);
            document.getElementById('p2').classList.toggle('active', n===2);
            document.getElementById('tab1').classList.toggle('active', n===1);
            document.getElementById('tab2').classList.toggle('active', n===2);
        }

        function closeCal() { document.getElementById('calendar-popup').style.display='none'; }

        function down(type) {
            const content = `Study Report: ${type}\nGenerated on: ${new Date().toLocaleString()}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Report_${type}.txt`;
            a.click();
        }

        const targets = {
            s: new Date("July 2, 2026").getTime(),
            e: new Date("July 29, 2026").getTime(),
            c: new Date("September 1, 2026").getTime(),
            m: new Date("December 11, 2026").getTime()
        };

        setInterval(() => {
            const now = new Date().getTime();
            document.getElementById('b-date').innerText = new Date().toLocaleDateString('bn-BD');
            const updateUI = (id, target, isMain=false) => {
                const diff = target - now;
                const d = Math.max(0, Math.floor(diff/86400000)), h = Math.max(0, Math.floor((diff%86400000)/3600000)), m = Math.max(0, Math.floor((diff%3600000)/60000)), s = Math.max(0, Math.floor((diff%60000)/1000));
                if(isMain) {
                    document.getElementById('main-d').innerText = d; document.getElementById('main-h').innerText = h;
                    document.getElementById('main-m').innerText = m; document.getElementById('main-s').innerText = s;
                } else {
                    const el = document.getElementById(id);
                    if(el) el.innerHTML = `<div class="time-box"><b>${d}</b><small>দিন</small></div><div class="time-box"><b>${h}</b><small>ঘণ্টা</small></div><div class="time-box"><b>${m}</b><small>মিঃ</small></div><div class="time-box"><b>${s}</b><small>সেঃ</small></div>`;
                }
            };
            updateUI('', targets.s, true);
            updateUI('cd-hsc-s', targets.s); updateUI('cd-hsc-e', targets.e); updateUI('cd-coach', targets.c); updateUI('cd-med', targets.m);
            document.getElementById('g1').innerText = `গ্যাপ: ${Math.floor((targets.c-targets.e)/86400000)} দিন`;
            document.getElementById('g2').innerText = `গ্যাপ: ${Math.floor((targets.m-targets.c)/86400000)} দিন`;
        }, 1000);

        let track, startT, active=false;
        function run(l) {
            if(active) stop();
            active=true; startT=Date.now();
            document.getElementById('status-label').innerText = "চলছে: " + l;
            track = setInterval(() => {
                let d = Date.now()-startT;
                let h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
                document.getElementById('live-timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }
        function stop() { clearInterval(track); active=false; document.getElementById('live-timer').innerText="00:00:00"; document.getElementById('status-label').innerText="বিরতি নিচ্ছেন"; }
    </script>
</body>
</html>
